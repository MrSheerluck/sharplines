version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sharplines-postgres

    environment:
      POSTGRES_USER: sharplines
      POSTGRES_PASSWORD: sharplines
      POSTGRES_DB: sharplines

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
