version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mainline-postgres

    environment:
      POSTGRES_USER: mainline
      POSTGRES_PASSWORD: mainline
      POSTGRES_DB: mainline

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
